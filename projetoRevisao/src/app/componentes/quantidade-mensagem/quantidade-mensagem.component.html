<div
	class="bolinha-mensagens"
	[matTooltip]="ultimasMensagensTooltip"
	matTooltipPosition="below"
	aria-label="Quantidade total de mensagens"
>
	<mat-icon
		matBadge="{{ totalMensagens }}"
		matBadgeColor="warn"
		matBadgeOverlap="false"

	>
		mark_email_unread
	</mat-icon>
</div>
