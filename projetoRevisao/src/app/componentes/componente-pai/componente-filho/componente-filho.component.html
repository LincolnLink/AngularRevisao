<div style="border: 2px solid red; padding: 20px; border-radius: 8px; margin-top: 20px;">
	<h3>Componente Filho (Formulário)</h3>

	<p><strong>Dados recebidos do pai:</strong></p>
	<p>ID: {{ pessoaRecebida.id }}</p>

	<form>
		<div style="margin-bottom: 15px;">
			<label for="nome">Nome: </label>
			<input
				id="nome"
				type="text"
				[(ngModel)]="pessoaEditada.nome"
				name="nome"
				placeholder="Digite o nome"
				style="padding: 5px; margin-left: 10px;">
		</div>

		<div style="margin-bottom: 15px;">
			<label for="email">Email: </label>
			<input
				id="email"
				type="email"
				[(ngModel)]="pessoaEditada.email"
				name="email"
				placeholder="Digite o email"
				style="padding: 5px; margin-left: 10px;">
		</div>

		<div style="margin-bottom: 15px;">
			<label for="idade">Idade: </label>
			<input
				id="idade"
				type="number"
				[(ngModel)]="pessoaEditada.idade"
				name="idade"
				placeholder="Digite a idade"
				style="padding: 5px; margin-left: 10px;">
		</div>

		<div>
			<button type="button" (click)="salvarDados()" style="padding: 8px 15px; background-color: green; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px;">
				Salvar e Enviar para Pai
			</button>
			<button type="button" (click)="resetarFormulario()" style="padding: 8px 15px; background-color: orange; color: white; border: none; border-radius: 4px; cursor: pointer;">
				Cancelar
			</button>
		</div>
	</form>
</div>
